<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schema Registry</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.5;
        }

        h1 {
            margin-bottom: 0.25rem;
        }

        .muted {
            color: #666;
            margin-top: 0;
        }

        .project {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px 20px;
            margin: 20px 0;
        }

        .version {
            margin-top: 16px;
        }

        .version h3 {
            margin-bottom: 8px;
        }

        ul {
            margin-top: 0;
        }

        a {
            color: #0969da;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        code {
            background: #f6f8fa;
            padding: 2px 4px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <h1>Schema Registry</h1>
    <p class="muted">Available JSON schemas.</p>

    <main id="registry">
        Loading schemas...
    </main>

    <script>
        async function loadRegistry() {
            const root = document.getElementById("registry");

            try {
                const response = await fetch("./index.json", { cache: "no-store" });

                if (!response.ok) {
                    throw new Error(`Failed to load index.json: ${response.status}`);
                }

                const projects = await response.json();

                if (!Array.isArray(projects) || projects.length === 0) {
                    root.textContent = "No schemas found.";
                    return;
                }

                root.innerHTML = "";

                for (const project of projects) {
                    const section = document.createElement("section");
                    section.className = "project";

                    const title = document.createElement("h2");
                    title.textContent = project.project;
                    section.appendChild(title);

                    const versions = project.versions || {};

                    for (const version of Object.keys(versions).sort()) {
                        const versionBlock = document.createElement("div");
                        versionBlock.className = "version";

                        const versionTitle = document.createElement("h3");
                        versionTitle.textContent = version;
                        versionBlock.appendChild(versionTitle);

                        const list = document.createElement("ul");

                        for (const schema of versions[version]) {
                            const item = document.createElement("li");

                            const link = document.createElement("a");
                            link.href = schema.path;
                            link.textContent = schema.name || schema.path;

                            const path = document.createElement("code");
                            path.textContent = schema.path;

                            item.appendChild(link);
                            item.append(" ");
                            item.appendChild(path);

                            list.appendChild(item);
                        }

                        versionBlock.appendChild(list);
                        section.appendChild(versionBlock);
                    }

                    root.appendChild(section);
                }
            } catch (error) {
                root.textContent = error.message;
            }
        }

        loadRegistry();
    </script>
</body>

</html>
